# Issuer raíz self-signed — firma el CA del laboratorio
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned-root
spec:
  selfSigned: {}
---
# CA del laboratorio firmada por el issuer raíz
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: tcg-ca
  namespace: cert-manager
spec:
  isCA: true
  commonName: tcg-lab-ca
  secretName: tcg-ca-secret
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: selfsigned-root
    kind: ClusterIssuer
---
# Issuer que usan los servicios para obtener sus certificados
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: tcg-ca-issuer
spec:
  ca:
    secretName: tcg-ca-secret
